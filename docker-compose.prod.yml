# Production deployment: Caddy terminates HTTPS (auto Let's Encrypt) and is the
# ONLY publicly exposed service. Frontend/backend are reachable solely through it.
#
services:
  db:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-todo_db}
    volumes:
      # Postgres 18+ images expect the mount at /var/lib/postgresql
      # (data is stored in a version-specific subdirectory).
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-todo_user} -d ${POSTGRES_DB:-todo_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    image: ghcr.io/fahadmalik16/todoapp-backend:latest
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-todo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-todo_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env (openssl rand -hex 32)}
      JWT_ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      CORS_ORIGINS: https://${DOMAIN:?set DOMAIN in .env}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    # NEXT_PUBLIC_API_URL (https://<DOMAIN>/api) is baked in at CI build time
    # via the DOMAIN repository variable — see the workflow file.
    image: ghcr.io/fahadmalik16/todoapp-frontend:latest
    restart: unless-stopped
    depends_on:
      - backend

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      DOMAIN: ${DOMAIN:?set DOMAIN in .env}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      # Persist TLS certificates across restarts (avoids re-issuing
      # and Let's Encrypt rate limits).
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

volumes:
  pgdata:
  caddy_data:
  caddy_config:
