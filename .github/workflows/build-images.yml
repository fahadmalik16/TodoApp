# Build and push production images to GitHub Container Registry (ghcr.io).
# Runs on GitHub's x86_64 runners, so images match the EC2 architecture.
# Free for public repositories.

name: Build and push images

on:
  push:
    branches: [main, aws-deploy]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: frontend
            context: ./frontend
            build-args: |
              NEXT_PUBLIC_API_URL=https://${{ vars.DOMAIN }}/api
          - service: backend
            context: ./backend
            build-args: ""
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64
          push: true
          # :latest for pull-based deploys; :<sha> kept for rollbacks.
          tags: |
            ghcr.io/${{ github.repository_owner }}/todoapp-${{ matrix.service }}:latest
            ghcr.io/${{ github.repository_owner }}/todoapp-${{ matrix.service }}:${{ github.sha }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
